<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>

  <!--<link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">-->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <script src="{{ '/assets/js/intro.js' | relative_url }}" defer></script>
  
</head>

<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="{{ '/' | relative_url }}" class="site-title">📚 Kiseki Wiki</a>
    </div>

    <div class="topbar-center">
      <input type="text" placeholder="Search (coming soon)" disabled>
    </div>

    <div class="topbar-right">
      <a href="{{ '/es/' | relative_url }}">ES</a>
      <a href="{{ '/en/' | relative_url }}">EN</a>
      <a href="{{ '/jp/' | relative_url }}">JP</a>
    </div>
  </div>
  
  <!-- LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      {% include sidebar.html %}
    </div>

    <!-- CONTENT -->
    <div class="content">
      <h1>{{ page.title }}</h1>
      <div>
        {{ content }}
      </div>
    </div>

  </div>

</body>
</html>

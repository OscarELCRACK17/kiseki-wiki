intro:
  - id: fc
    text: >
      Un joven adoptado por la familia Bright hace cinco años. Es apuesto, con cabello negro azabache y ojos color ámbar. Es tranquilo, sereno e inteligente; a menudo tiene que vigilar a Estelle, quien suele ir siempre por delante. Es un bracer joven, igual que ella, y su arma predilecta es un par de afiladas espadas de doble filo.
  - id: zero
    text: >
      Joshua es uno de los protagonistas de la serie Trails in the Sky. Es el hermano adoptivo de Estelle, su pareja sentimental y también bracer. Ambos viajaron desde Liberl para trabajar en la sucursal del Gremio de Bracers de Crossbell por una razón específica. Joshua es un antiguo miembro de la sociedad secreta conocida como Ouroboros y conserva sus letales habilidades de su época como Ejecutor n.° XIII, el Colmillo Negro.
  - id: cs4
    text: >
      Joshua, un bracer veterano originario de Erebonia, es a la vez compañero y amante de Estelle. Nacido en Hamel, es uno de los pocos supervivientes de la tragedia que allí tuvo lugar. Poco después se unió a Ouroboros como el Ejecutor n.º XIII, el Colmillo Negro. Durante su tiempo en la sociedad, Joshua llevó a cabo numerosas misiones de espionaje y asesinato. Sin embargo, fue rescatado por Cassius y Estelle. Se unió a la familia Bright y eligió el camino de bracer. Durante su trabajo como bracer, terminó asociándose con la SSS para ayudar a resolver el incidente de la secta en Crossbell. Posteriormente, él y Estelle dieron la bienvenida a Renne a su familia.    



intro:
  - id: fc
    text: >
      Estudiante de la prestigiosa Academia Real de Jenis, en la región de Ruan. En sus días libres, ayuda en un orfanato cercano, donde su bondad y dulzura le han granjeado la confianza de los niños y de la directora. Aunque no hablan el mismo idioma, comparte un vínculo muy especial con el halcón blanco Sieg. Conoce a Estelle y Joshua durante una visita a un pueblo cercano por asuntos relacionados con el orfanato.
  - id: azure
    text: >
      La princesa heredera del Reino de Liberl ha llegado a Crossbell a bordo del Arseille para asistir a una conferencia internacional en lugar de su abuela, la reina Alicia II. La acompaña su compañero, un halcón gerifalte llamado Sieg.
  - id: cs4
    text: >
      Descendiente de la familia Auslese, herederos del Sept-Terrion del Espacio, Klaudia es la heredera al trono de Liberl. Durante su época de estudiante en la Real Academia Jenis, ocultó su verdadera identidad. Fue entonces cuando conoció a Estelle y Joshua, y acabó uniéndose a ellos para ayudar a resolver los incidentes en Liberl. Gracias a sus viajes, comprendió el camino que debía seguir y disipó las dudas que tenía sobre asumir el trono. Cuando descubre que la guerra entre Erebonia y Calvard es inminente, comienza a actuar como Princesa Heredera de Liberl.


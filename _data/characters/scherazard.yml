intro:
  - id: fc
    text: >
      Una Bracer veterana conocida como "Silver Streak". Posee un físico atlético y bien entrenado, además de una belleza cautivadora. Fue aprendiz del padre de Estelle, Cassius, y es como una hermana mayor para Estelle y los demás. Tiene una personalidad cariñosa y protectora, pero también es conocida por su afición al alcohol y tiende a volverse un poco demasiado apegada cuando está ebria. Como mentora influyente, vela por Estelle y los demás, ofreciéndoles apoyo y orientación en su desarrollo.
  - id: sc
    text: >
      Una bracer femenina conocida con el apodo de "Silver Streak". Es como una hermana para Estelle y tiene la mala costumbre de beber en exceso. Mientras ayuda a Estelle en su viaje, investigando los movimientos de la misteriosa organización "Ouroboros" que manipulaba el golpe de estado entre bastidores, se revela su sorprendente pasado.
  - id: third  
    text: >
      Una bracer femenina conocida con el apodo de "Silver Streak". Incluso después de que Estelle y Joshua emprendieran su viaje, sigue activa en la Capital Real y Rolent, y su buen juicio la ha convertido en una líder entre las bracers más jóvenes. Sin embargo, su afición a la bebida y su estilo de vida despreocupado se han mantenido prácticamente intactos. Hace aproximadamente un mes, por alguna razón, se cortó el pelo y empezó a usar ropa de trabajo nueva.
  - id: cs4
    text: >
      También conocida como Silver Streak, Scherazard es una bracer de rango A del Gremio de Bracers de Liberia. Fue entrenada por Cassius durante su época como bracer, y Estelle la considera como una hermana mayor. Scherazard conoció al príncipe Olivert hace cuatro años durante los incidentes en Liberl y desde entonces han mantenido un contacto estrecho. Cuando el Gremio de Bracers detectó un brote de jaegers y agentes de Ouroboros en Erebonia, ella acudió allí con su compañera bracer de rango A, Agate. Cuando el Gral de Erebos se manifestó en Heimdallr, presenció la explosión del Courageous... con Olivert a bordo.    


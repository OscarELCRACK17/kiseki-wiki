intro:
  - id: fc
    text: >
      El padre de Estelle. Un hombre de mediana edad con un físico bien tonificado y un llamativo bigote de dandi. Como veterano bracer, también es el maestro de Estelle, Joshua y Scherazard.
  - id: cs4
    text: >
      El legendario comandante del Ejército Real de Lirel, conocido por derrotar al Ejército Imperial en la Guerra de los Cien Días hace 14 años. Tras estudiar con Yun Ka-fai de la Escuela de las Ocho Hojas, una Espada, Cassius dominó el estilo y es conocido como la Espada Divina. Se retiró del ejército tras la muerte de su esposa en la Guerra de los Cien Días, dedicándose a ayudar a la gente como bracer. Sus hazañas en Zemuria le valieron el ascenso a bracer de rango S, un rango que solo se concede a un selecto grupo de personas. Tras el ataque a las ramas del gremio de Erebon y el golpe de estado en Libel, regresó al servicio activo en el ejército. Desde entonces, Cassius ha estado ayudando a reconstruir el Ejército Real de Lirel, trabajando junto al Príncipe Olivert para vigilar los movimientos sospechosos del gobierno de Erebon.    


